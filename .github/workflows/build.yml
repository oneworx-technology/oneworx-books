name: Build Oneworx Installer

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.18.1'

    - name: Install Yarn
      run: npm install -g yarn

    - name: Install ImageMagick
      run: choco install imagemagick.app -y

    - name: Generate 256x256 Icon from Logo
      shell: pwsh
      run: |
        # Create icons directory if needed
        if (!(Test-Path "build/icons")) {
          New-Item -ItemType Directory -Path "build/icons" -Force
        }
        
        # Generate proper 256x256 icon from your logo
        $logoPath = "build-assets/logo.png"
        $iconPath = "build/icon.ico"
        
        if (Test-Path $logoPath) {
          # Find ImageMagick's convert executable
          $convertPath = (Get-Command convert.exe -ErrorAction SilentlyContinue).Source
          
          if ($convertPath) {
            & "$convertPath" "$logoPath" -resize 256x256 -flatten "$iconPath"
            Write-Host "Icon generated successfully: $iconPath"
          } else {
            Write-Host "ImageMagick convert.exe not found in PATH"
            exit 1
          }
        } else {
          Write-Host "Logo not found at: $logoPath"
        }

    - name: Install Project Dependencies
      run: yarn install

    - name: Create Missing log_creds.txt
      run: |
        echo "dummy-key" > log_creds.txt
        echo "dummy-secret" >> log_creds.txt
        echo "dummy-url" >> log_creds.txt
        echo "dummy-telemetry" >> log_creds.txt

    - name: Build Oneworx Windows Installer
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        NODE_ENV: production
      run: yarn build --win

    - name: Upload Windows Installer Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Oneworx-Windows-Installer
        path: dist_electron/bundled/
        retention-days: 30
