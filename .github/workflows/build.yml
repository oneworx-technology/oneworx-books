name: Build Oneworx Installer

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Install Icon Conversion Tool
      run: npm install -g electron-icon-maker --legacy-peer-deps

    - name: Generate Desktop Icons from PNG
      shell: bash
      run: |
        electron-icon-maker --input=build-assets/logo.png --output=build-assets
        cp build-assets/icons/win/icon.ico src-electron/icons/icon.ico || true
        cp build-assets/icons/mac/icon.icns src-electron/icons/icon.icns || true
        cp build-assets/logo.png src/assets/logo.png || true

    - name: Automate Text and Branding Swap
      shell: bash
      run: |
        sed -i 's/"name": "frappe-books"/"name": "oneworx"/g' package.json
        sed -i 's/"productName": "Frappe Books"/"productName": "Oneworx"/g' package.json
        sed -i 's/"description": ".*"/"description": "Oneworx Accounting Software"/g' package.json
        find src/ -type f -exec sed -i 's/Frappe Books/Oneworx/g' {} + || true

    - name: Install Project Dependencies (Forced)
      run: npm install --legacy-peer-deps

    - name: Compile and Package Installer
      run: npm run build
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        NODE_ENV: production

    - name: Save Finished Oneworx Installer
      uses: actions/upload-artifact@v4
      with:
        name: Oneworx-Windows-Installer
        path: |
          **/*.exe
          **/*.msi
          src-electron/dist/**/*.exe
